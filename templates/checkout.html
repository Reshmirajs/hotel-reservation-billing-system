{% extends "base.html" %}

{% block content %}
	<div class="card align-center">
		<h2>Checkout Customer</h2>
		<form method="POST">
			<div style="max-width:320px;margin:0 auto">
				<input name="reservation_id" placeholder="Reservation ID">
				<label class="mt-2">Actual Check Out Date (leave empty to use expected)</label>
				<input type="date" name="actual_check_out">
				<div class="mt-2"><button class="btn" type="submit">Generate Bill (Checkout)</button></div>
			</div>
		</form>
	</div>
{% endblock %}
