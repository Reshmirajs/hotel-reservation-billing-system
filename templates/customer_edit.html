{% extends "base.html" %}

{% block content %}
  <div class="card">
    <h2>Edit Customer</h2>
    {% if customer %}
    <form method="POST">
      <h5>Personal Information</h5>
      <div class="form-row">
        <div class="col"><label>First name</label><input name="first_name" value="{{ customer[1] }}"></div>
        <div class="col"><label>Last name</label><input name="last_name" value="{{ customer[2] }}"></div>
      </div>

      <h5 class="mt-3">Address</h5>
      <div class="form-row">
        <div class="col"><label>Street</label><input name="street" value="{{ customer[3] }}"></div>
        <div class="col"><label>City</label><input name="city" value="{{ customer[4] }}"></div>
        <div class="col"><label>PIN</label><input name="pin" value="{{ customer[5] }}"></div>
      </div>

      <h5 class="mt-3">Contact Information</h5>
      <div class="form-row">
        <div class="col"><label>Email</label><input name="email" value="{{ customer[6] }}"></div>
        <div class="col"><label>Phone</label><input name="phone" value="{{ customer[7] }}"></div>
      </div>

      <h5 class="mt-3">ID Proof</h5>
      <div class="form-row">
        <div class="col"><label>ID proof type</label><input name="id_proof_type" value="{{ customer[8] }}"></div>
        <div class="col"><label>ID proof number</label><input name="id_proof_number" value="{{ customer[9] }}"></div>
      </div>

      <div class="mt-2">
        <button class="btn" type="submit">Save</button>
        <a href="{{ url_for('customer_detail', customer_id=customer[0]) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
    {% else %}
      <p>Customer not found.</p>
    {% endif %}
  </div>
{% endblock %}
