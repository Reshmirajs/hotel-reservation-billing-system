{% extends "base.html" %}

{% block content %}
	<div class="card">
		<h2>Make a Reservation</h2>
		<form method="POST">
			<h5>Personal Information</h5>
			<div class="form-row">
				<div class="col">
					<input name="first_name" placeholder="First Name">
				</div>
				<div class="col">
					<input name="last_name" placeholder="Last Name">
				</div>
			</div>

			<h5 class="mt-3">Address</h5>
			<div class="form-row">
				<div class="col"><input name="street" placeholder="Street"></div>
				<div class="col"><input name="city" placeholder="City"></div>
				<div class="col"><input name="pin" placeholder="PIN"></div>
			</div>

			<h5 class="mt-3">Contact Information</h5>
			<div class="form-row">
				<div class="col"><input name="email" placeholder="Email"></div>
				<div class="col"><input name="phone" placeholder="Phone"></div>
			</div>

			<h5 class="mt-3">ID Proof</h5>
			<div class="form-row">
				<div class="col"><input name="id_proof_type" placeholder="ID Proof Type"></div>
				<div class="col"><input name="id_proof_number" placeholder="ID Number"></div>
			</div>

			<h5 class="mt-3">Reservation Dates</h5>
			<div class="form-row">
				<div class="col"><label>Check In</label><input type="date" name="check_in"></div>
				<div class="col"><label>Expected Check Out Date</label><input type="date" name="check_out"></div>
			</div>

			<div class="align-center"><button class="btn" type="submit">Check Available Rooms</button></div>
		</form>
	</div>
{% endblock %}
