{% extends "base.html" %}

{% block content %}
	<div class="card">
		<h2>Make a Reservation</h2>
		<form method="POST" id="reservationForm" novalidate>
			<h5>Personal Information</h5>
			<div class="form-row">
				<div class="col">
					<input name="first_name" placeholder="First Name" required>
				</div>
				<div class="col">
					<input name="last_name" placeholder="Last Name">
				</div>
			</div>

			<h5 class="mt-3">Address</h5>
			<div class="form-row">
				<div class="col"><input name="street" placeholder="Street"></div>
				<div class="col"><input name="city" placeholder="City"></div>
				<div class="col"><input name="pin" placeholder="PIN"></div>
			</div>

			<h5 class="mt-3">Contact Information</h5>
			<div class="form-row">
				<div class="col">
					<label>Email</label>
					<input id="emailInput" name="email" type="email" placeholder="example@gmail.com">
					<span id="email_warn" class="field-warn"></span>
				</div>
				<div class="col">
					<label>Phone</label>
					<div class="phone-input-group">
						<select id="countryCodeSelect" name="country_code" class="country-code-select">
							<option value="+91">🇮🇳 +91 (India)</option>
							<option value="+1">🇺🇸 +1 (USA)</option>
							<option value="+44">🇬🇧 +44 (UK)</option>
							<option value="+61">🇦🇺 +61 (Australia)</option>
							<option value="+971">🇦🇪 +971 (UAE)</option>
							<option value="+65">🇸🇬 +65 (Singapore)</option>
							<option value="+60">🇲🇾 +60 (Malaysia)</option>
							<option value="+64">🇳🇿 +64 (New Zealand)</option>
							<option value="+49">🇩🇪 +49 (Germany)</option>
							<option value="+33">🇫🇷 +33 (France)</option>
							<option value="+39">🇮🇹 +39 (Italy)</option>
							<option value="+34">🇪🇸 +34 (Spain)</option>
							<option value="+81">🇯🇵 +81 (Japan)</option>
							<option value="+86">🇨🇳 +86 (China)</option>
							<option value="+82">🇰🇷 +82 (South Korea)</option>
							<option value="+55">🇧🇷 +55 (Brazil)</option>
							<option value="+27">🇿🇦 +27 (South Africa)</option>
							<option value="+7">🇷🇺 +7 (Russia)</option>
							<option value="+966">🇸🇦 +966 (Saudi Arabia)</option>
							<option value="+94">🇱🇰 +94 (Sri Lanka)</option>
							<option value="+92">🇵🇰 +92 (Pakistan)</option>
							<option value="+880">🇧🇩 +880 (Bangladesh)</option>
							<option value="+977">🇳🇵 +977 (Nepal)</option>
							<option value="+95">🇲🇲 +95 (Myanmar)</option>
							<option value="+66">🇹🇭 +66 (Thailand)</option>
						</select>
						<input id="phoneInput" name="phone" placeholder="Phone number" class="phone-number-input">
					</div>
					<span id="phone_warn" class="field-warn"></span>
				</div>
			</div>

			<h5 class="mt-3">ID Proof</h5>
			<div class="form-row">
				<div class="col">
					<label>ID Proof Type</label>
					<select id="idProofTypeSelect" name="id_proof_type" class="custom-select w-100 p-2 border rounded" style="background:#fff8f2; border-color:#d4b896; color:#3d2b1f;">
						<option value="Aadhaar">Aadhaar Card</option>
						<option value="PAN">PAN Card</option>
						<option value="Passport">Passport (India)</option>
						<option value="Voter ID">Voter ID</option>
						<option value="Driving License">Driving License</option>
						<option value="Other">Other</option>
					</select>
				</div>
				<div class="col">
					<label>ID Proof Number</label>
					<input id="idProofNumberInput" name="id_proof_number" placeholder="Enter ID Number" style="text-transform: uppercase;" required>
					<span id="id_proof_warn" class="field-warn"></span>
				</div>
			</div>

			<h5 class="mt-3">Reservation Dates</h5>
			<div class="form-row">
				<div class="col">
					<label>Check In</label>
					<input type="date" id="check_in" name="check_in" min="{{ today }}" required>
					<span id="check_in_warn" class="date-warn"></span>
				</div>
				<div class="col">
					<label>Expected Check Out Date</label>
					<input type="date" id="check_out" name="check_out" min="{{ today }}" required>
					<span id="check_out_warn" class="date-warn"></span>
				</div>
			</div>

			<div class="align-center"><button class="btn" type="submit">Check Available Rooms</button></div>
		</form>
	</div>

<style>
  .date-warn, .field-warn {
    display: block;
    color: #c0392b;
    background: #fdf0ef;
    border: 1px solid #e74c3c;
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    font-size: 13px;
    font-weight: 500;
  }
  .date-warn:empty, .field-warn:empty { display: none; }

  .phone-input-group {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .country-code-select {
    flex: 0 0 auto;
    width: 130px;
    padding: 8px 4px;
    border: 1px solid #d4b896;
    border-radius: 6px;
    background: #fff;
    color: #000;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .phone-number-input {
    flex: 1;
    min-width: 0;
  }
  .country-code-select:focus {
    outline: none;
    border-color: var(--accent, #8b5e3c);
    box-shadow: 0 0 0 3px rgba(139,94,60,0.15);
  }
</style>

<script>
  (function () {
    var today = "{{ today }}";

    var checkInEl  = document.getElementById('check_in');
    var checkOutEl = document.getElementById('check_out');
    var checkInWarn  = document.getElementById('check_in_warn');
    var checkOutWarn = document.getElementById('check_out_warn');
    var emailInput = document.getElementById('emailInput');
    var emailWarn  = document.getElementById('email_warn');
    var phoneInput = document.getElementById('phoneInput');
    var phoneWarn  = document.getElementById('phone_warn');

    /* ---- Date validation ---- */
    function validateCheckIn() {
      var val = checkInEl.value;
      if (!val) { checkInWarn.textContent = ''; return true; }
      if (val < today) {
        checkInWarn.textContent = '⚠ Check-in date cannot be in the past.';
        checkInEl.setCustomValidity('Check-in date cannot be in the past.');
        return false;
      }
      checkInWarn.textContent = '';
      checkInEl.setCustomValidity('');
      checkOutEl.min = val;
      validateCheckOut();
      return true;
    }

    function validateCheckOut() {
      var cin  = checkInEl.value;
      var cout = checkOutEl.value;
      if (!cout) { checkOutWarn.textContent = ''; return true; }
      if (cout < today) {
        checkOutWarn.textContent = '⚠ Check-out date cannot be in the past.';
        checkOutEl.setCustomValidity('Check-out date cannot be in the past.');
        return false;
      }
      if (cin && cout <= cin) {
        checkOutWarn.textContent = '⚠ Check-out must be after check-in.';
        checkOutEl.setCustomValidity('Check-out must be after check-in.');
        return false;
      }
      checkOutWarn.textContent = '';
      checkOutEl.setCustomValidity('');
      return true;
    }

    /* ---- Email validation: must have @ and valid domain with dot ---- */
    function validateEmail() {
      var val = emailInput.value.trim();
      if (!val) { emailWarn.textContent = ''; emailInput.setCustomValidity(''); return true; }
      // Must match: something@something.something (min 2-char TLD)
      var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      if (!emailRegex.test(val)) {
        emailWarn.textContent = '⚠ Please enter a valid email (e.g. name@gmail.com).';
        emailInput.setCustomValidity('Invalid email address.');
        return false;
      }
      emailWarn.textContent = '';
      emailInput.setCustomValidity('');
      return true;
    }

    /* ---- Phone validation: 7–15 digits ---- */
    function validatePhone() {
      var val = phoneInput.value.trim().replace(/[\s\-\(\)]/g, '');
      if (!val) { phoneWarn.textContent = ''; phoneInput.setCustomValidity(''); return true; }
      var phoneRegex = /^\d{7,15}$/;
      if (!phoneRegex.test(val)) {
        phoneWarn.textContent = '⚠ Phone number must be 7–15 digits (no spaces or dashes).';
        phoneInput.setCustomValidity('Invalid phone number.');
        return false;
      }
      phoneWarn.textContent = '';
      phoneInput.setCustomValidity('');
      return true;
    }

    var idTypeSelect = document.getElementById('idProofTypeSelect');
    var idNumberInput= document.getElementById('idProofNumberInput');
    var idWarn       = document.getElementById('id_proof_warn');

    /* ---- ID Proof validation ---- */
    function validateIdProof() {
      if (!idTypeSelect || !idNumberInput) return true;
      var type = idTypeSelect.value;
      var val = idNumberInput.value.trim().toUpperCase();
      // force text transform to backend value as well
      if(val !== idNumberInput.value) { idNumberInput.value = val; }

      if (!val) {
        idWarn.textContent = '⚠ ID Proof number is required.';
        idNumberInput.setCustomValidity('Required.');
        return false;
      }

      var isValid = true;
      var errMsg = '';

      if (type === 'Aadhaar') {
        if (!/^\d{12}$/.test(val)) { isValid = false; errMsg = 'Aadhaar must be exactly 12 digits.'; }
      } else if (type === 'PAN') {
        if (!/^[A-Z]{5}[0-9]{4}[A-Z]{1}$/.test(val)) { isValid = false; errMsg = 'Invalid PAN format (e.g. ABCDE1234F).'; }
      } else if (type === 'Passport') {
        if (!/^[A-Z][0-9]{7}$/.test(val)) { isValid = false; errMsg = 'Passport must be 1 letter followed by 7 digits.'; }
      } else if (type === 'Voter ID') {
        if (!/^[A-Z]{3}[0-9]{7}$/.test(val)) { isValid = false; errMsg = 'Voter ID is typically 3 letters + 7 digits.'; }
      } else if (type === 'Driving License') {
        if (val.length < 10) { isValid = false; errMsg = 'Driving License format is too short.'; }
      }

      if (!isValid) {
        idWarn.textContent = '⚠ ' + errMsg;
        idNumberInput.setCustomValidity(errMsg);
        return false;
      }
      idWarn.textContent = '';
      idNumberInput.setCustomValidity('');
      return true;
    }

    checkInEl.addEventListener('change', validateCheckIn);
    checkInEl.addEventListener('input',  validateCheckIn);
    checkOutEl.addEventListener('change', validateCheckOut);
    checkOutEl.addEventListener('input',  validateCheckOut);
    emailInput.addEventListener('input', validateEmail);
    emailInput.addEventListener('blur',  validateEmail);
    phoneInput.addEventListener('input', validatePhone);
    phoneInput.addEventListener('blur',  validatePhone);
    
    idNumberInput.addEventListener('input', validateIdProof);
    idNumberInput.addEventListener('blur', validateIdProof);
    idTypeSelect.addEventListener('change', validateIdProof);

    /* ---- On submit: combine country code + phone, also validate all ---- */
    document.getElementById('reservationForm').addEventListener('submit', function(e) {
      var valid = true;
      if (!validateCheckIn()) valid = false;
      if (!validateCheckOut()) valid = false;
      if (!validateEmail()) valid = false;
      if (!validatePhone()) valid = false;
      if (!validateIdProof()) valid = false;
      if (!valid) { e.preventDefault(); return; }

      // Prepend country code to phone value before form submission
      var code = document.getElementById('countryCodeSelect').value;
      var number = phoneInput.value.trim().replace(/[\s\-\(\)]/g, '');
      phoneInput.value = code + number;
      // Remove country_code from form so only phone is submitted
      document.getElementById('countryCodeSelect').disabled = true;
    });
  })();
</script>
{% endblock %}
